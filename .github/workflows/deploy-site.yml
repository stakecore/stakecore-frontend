name: Deploy site

on:
  push:
    branches:
      - main

# `pages: write` allows publishing to Pages. `id-token: write` lets the
# deploy action mint an OIDC token that proves the artifact came from
# this workflow run. `contents: read` is just for `actions/checkout`.
permissions:
  contents: read
  pages: write
  id-token: write

# Queue up overlapping pushes so the latest commit always wins. We don't
# cancel a running deploy mid-flight (cancel-in-progress: false) to avoid
# leaving Pages in a half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build-all

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
